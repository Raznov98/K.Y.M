<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KYM Parfums</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold-light: #ffe08a;
      --gold-mid: #d4a017;
      --gold-deep: #8a5b05;
      --bg-dark: #080704;
      --card-dark: #121008;
      --text-light: #f8eecc;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      font-family: 'Cormorant Garamond', serif;
      background:
        radial-gradient(circle at top, rgba(212,160,23,0.20), transparent 38%),
        radial-gradient(circle at bottom, rgba(212,160,23,0.12), transparent 45%),
        linear-gradient(180deg, #141004 0%, #080704 55%, #030302 100%);
      color: var(--text-light);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,224,138,0.12), transparent 35%),
        radial-gradient(circle at 20% 85%, rgba(212,160,23,0.10), transparent 28%),
        radial-gradient(circle at 80% 70%, rgba(255,224,138,0.08), transparent 30%);
      pointer-events: none;
      z-index: 0;
    }

    .particles {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--gold-light);
      box-shadow: 0 0 12px var(--gold-light);
      opacity: 0;
      animation: floatUp var(--duration) linear infinite;
      animation-delay: var(--delay);
    }

    @keyframes floatUp {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      15% { opacity: .65; }
      85% { opacity: .25; }
      100% { transform: translateY(-10vh) scale(1.4); opacity: 0; }
    }

    .smoke-svg {
      position: fixed;
      bottom: -80px;
      left: 50%;
      width: 760px;
      max-width: 120vw;
      transform: translateX(-50%);
      opacity: 0.10;
      pointer-events: none;
      z-index: 0;
      animation: smokeMove 11s ease-in-out infinite alternate;
    }

    @keyframes smokeMove {
      from { transform: translateX(-50%) translateY(0) scaleX(1); }
      to { transform: translateX(-50%) translateY(-26px) scaleX(1.08); }
    }

    .wrapper {
      width: 100%;
      max-width: 480px;
      padding: 48px 24px 60px;
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      animation: fadeDown .8s ease both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-ring {
      width: 140px;
      height: 140px;
      position: relative;
      margin-bottom: 22px;
    }

    .logo-ring svg.ring {
      width: 100%;
      height: 100%;
      position: absolute;
      inset: 0;
      animation: rotateRing 20s linear infinite;
    }

    @keyframes rotateRing {
      to { transform: rotate(360deg); }
    }

    .logo-inner {
      position: absolute;
      inset: 12px;
      border-radius: 50%;
      overflow: hidden;
      background: radial-gradient(circle at 40% 30%, #211908, #070604 72%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 0 30px rgba(212,160,23,0.12), 0 0 28px rgba(212,160,23,0.18);
    }

    .logo-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
    }

    .brand-name {
      font-family: 'Cinzel', serif;
      font-size: 2.65rem;
      line-height: 1;
      letter-spacing: 0.13em;
      font-weight: 700;
      background: linear-gradient(120deg, #ffeaa2, #d4a017, #fff0aa, #8a5b05);
      background-size: 220% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shine 4s linear infinite;
    }

    @keyframes shine {
      to { background-position: 220% center; }
    }

    .brand-sub {
      font-family: 'Cinzel', serif;
      font-size: .72rem;
      letter-spacing: .48em;
      color: var(--gold-mid);
      text-transform: uppercase;
      margin-top: 8px;
    }

    .divider {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 34px 0 30px;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,160,23,.7), transparent);
    }

    .divider-gem {
      width: 10px;
      height: 10px;
      transform: rotate(45deg);
      background: var(--gold-mid);
      box-shadow: 0 0 16px rgba(212,160,23,.65);
    }

    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .link-card {
      min-height: 84px;
      width: 100%;
      position: relative;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 22px;
      border-radius: 13px;
      border: 1px solid rgba(212,160,23,0.35);
      background: linear-gradient(135deg, rgba(255,224,138,0.045), rgba(18,16,8,0.92));
      color: var(--text-light);
      text-decoration: none;
      overflow: hidden;
      backdrop-filter: blur(6px);
      box-shadow: 0 10px 30px rgba(0,0,0,.26);
      transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
    }

    .link-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 30%, rgba(255,224,138,0.16), transparent 70%);
      transform: translateX(-110%);
      transition: transform .55s ease;
    }

    .link-card:hover {
      transform: translateY(-4px) scale(1.015);
      border-color: rgba(255,224,138,0.70);
      box-shadow: 0 12px 34px rgba(212,160,23,0.18), inset 0 0 0 1px rgba(212,160,23,0.10);
    }

    .link-card:hover::before {
      transform: translateX(110%);
    }

    .link-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-shrink: 0;
      border: 1px solid rgba(212,160,23,0.50);
      background: linear-gradient(135deg, rgba(212,160,23,.25), rgba(94,62,4,.18));
      color: var(--gold-light);
      font-size: 1.25rem;
      font-family: Arial, sans-serif;
      font-weight: 700;
      position: relative;
      z-index: 2;
    }

    .link-icon svg {
      width: 23px;
      height: 23px;
      fill: var(--gold-light);
    }

    .link-text {
      flex: 1;
      position: relative;
      z-index: 2;
    }

.link-label{
font-family:'Montserrat',sans-serif;
font-size:0.78rem;
font-weight:700;
letter-spacing:3px;
color:var(--gold-mid);
text-transform:uppercase;
}

.link-value{
font-family:'Poppins',sans-serif;
font-size:1rem;
font-weight:600;
color:#ffffff;
letter-spacing:0;
line-height:1.4;
}

    .link-arrow {
      color: var(--gold-mid);
      font-size: 1.25rem;
      opacity: .7;
      position: relative;
      z-index: 2;
      transition: transform .25s ease, opacity .25s ease;
    }

    .link-card:hover .link-arrow {
      transform: translateX(5px);
      opacity: 1;
    }

    .footer {
      margin-top: 44px;
      text-align: center;
      font-family: 'Cinzel', serif;
      font-size: .6rem;
      letter-spacing: .35em;
      color: rgba(212,160,23,0.42);
      text-transform: uppercase;
      line-height: 1.8;
    }

    @media (max-width: 480px) {
      .wrapper { padding: 34px 18px 48px; }
      .brand-name { font-size: 2.15rem; }
      .brand-sub { font-size: .64rem; }
      .logo-ring { width: 122px; height: 122px; }
      .link-card { min-height: 78px; padding: 16px 18px; }
      .link-value { font-size: 1.05rem; }
    }
  </style>
</head>

<body>
  <div class="particles" id="particles"></div>

  <svg class="smoke-svg" viewBox="0 0 700 300" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M10 280 Q100 150 200 200 Q300 250 400 120 Q500 20 600 100 Q670 160 690 260" stroke="#d4a017" stroke-width="3" fill="none" opacity="0.65" />
    <path d="M30 290 Q130 180 220 220 Q330 260 430 140 Q510 50 610 120 Q680 175 695 270" stroke="#ffe08a" stroke-width="1.4" fill="none" opacity="0.35" />

    <div class="divider">
      <div class="divider-line"></div>

    <section class="links">

          </svg>

          <div class="link-label">Facebook</div>

          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1 0-5.78c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0 0 12.68 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.76a4.85 4.85 0 0 1-1.01-.07z" />

          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5A2.5 2.5 0 1 1 12 6a2.5 2.5 0 0 1 0 5.5z" />
          </svg>

        <div class="link-text">
          <div class="link-label">Location</div>

    </section>

    <footer class="footer">
      © 2026 KYM Parfums · The Art of Fragrance
    </footer>
  </main>

  <script>
    const particles = document.getElementById('particles');

    for (let i = 0; i < 30; i++) {
      const particle = document.createElement('span');
      particle.className = 'particle';
      particle.style.left = Math.random() * 100 + 'vw';
      particle.style.setProperty('--duration', 7 + Math.random() * 9 + 's');
      particle.style.setProperty('--delay', Math.random() * 8 + 's');
      const size = 1 + Math.random() * 3;
      particle.style.width = size + 'px';
      particle.style.height = size + 'px';
      particles.appendChild(particle);
    }
  </script>
</body>
</html>
